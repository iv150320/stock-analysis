<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320" width="1440" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(88,166,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(88,166,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="25%" cy="75%" r="50%">
      <stop offset="0%" stop-color="rgba(188,140,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(188,140,255,0)"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="320" fill="url(#bg)" rx="0" ry="0"/>
  <rect width="1440" height="320" fill="url(#glow1)" rx="0" ry="0"/>
  <rect width="1440" height="320" fill="url(#glow2)" rx="0" ry="0"/>

  <!-- Decorative chart bars -->
  <g opacity="0.25">
    <rect x="180" y="200" width="24" height="60" rx="4" fill="url(#bar)"/>   
    <rect x="216" y="160" width="24" height="100" rx="4" fill="url(#bar)"/>
    <rect x="252" y="120" width="24" height="140" rx="4" fill="url(#bar)"/>
    <rect x="288" y="90" width="24" height="170" rx="4" fill="url(#bar)"/>
    <rect x="324" y="140" width="24" height="120" rx="4" fill="url(#bar)"/>
    <rect x="360" y="60" width="24" height="200" rx="4" fill="url(#bar)"/>
    <rect x="396" y="180" width="24" height="80" rx="4" fill="url(#bar)"/>
    <rect x="432" y="110" width="24" height="150" rx="4" fill="url(#bar)"/>
  </g>

  <!-- Decorative line chart -->
  <g stroke="rgba(88,166,255,0.15)" stroke-width="2" fill="none">
    <polyline points="600,220 680,180 740,200 800,150 860,160 920,120 980,140 1040,90 1100,100 1160,70"/>
    <circle cx="1160" cy="70" r="4" fill="rgba(88,166,255,0.3)" stroke="none"/>
  </g>

  <!-- Main text -->
  <text x="720" y="140" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="900" fill="#f0f6fc" letter-spacing="-2">StockScope</text>
  <text x="720" y="185" text-anchor="middle" font平方公里的 font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#94a3b8" letter-spacing="0.5">S&amp;P 500 Market Intelligence — CS50x Final Project</text>

  <!-- Tagline / stats row -->
  <g font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#58a6ff">
    <text x="720" y="240" text-anchor="middle" fill="#58a6ff">160 Tickers · 8 Sectors · Real-time Analytics</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="540" y1="270" x2="900" y2="270" stroke="rgba(88,166,255,0.2)" stroke-width="1" stroke-linecap="round"/>
  <circle cx="540" cy="270" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="900" cy="270" r="3" fill="#58a6ff" opacity="0.5"/>
</svg>