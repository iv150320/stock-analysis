<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <title>StockScope</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: rgba(255,255,255,0.85);
            --surface-border: rgba(255,255,255,0.3);
            --text: #1a1a2e;
            --text-muted: #6c757d;
            --card-shadow: 0 8px 32px rgba(0,0,0,0.06);
            --nav-bg: rgba(26,26,46,0.95);
            --hero-from: #1a1a2e;
            --hero-to: #16213e;
            --green: #00b894;
            --red: #e17055;
            --blue: #4facfe;
            --purple: #a18cd1;
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: rgba(22,27,34,0.9);
            --surface-border: rgba(255,255,255,0.08);
            --text: #e6edf3;
            --text-muted: #8b949e;
            --card-shadow: 0 8px 32px rgba(0,0,0,0.3);
            --nav-bg: rgba(13,17,23,0.98);
            --hero-from: #0d1117;
            --hero-to: #161b22;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
        }
        * { font-family: 'Inter', -apple-system, sans-serif; }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(79,172,254,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(161,140,209,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(0,184,148,0.03) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }
        .navbar {
            background: var(--nav-bg) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }
        .navbar-brand { font-weight: 900; font-size: 1.5rem; letter-spacing: -0.5px; }
        .navbar-brand i { background: linear-gradient(135deg, #f6d365, #fda085); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-right: 8px; }
        .nav-link { font-weight: 500; border-radius: 10px; margin: 0 2px; transition: all 0.25s; }
        .nav-link:hover { background: rgba(255,255,255,0.08); transform: translateY(-1px); }
        .card {
            background: var(--surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 48px rgba(0,0,0,0.1); }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--surface-border);
            padding: 1.2rem 1.5rem;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }
        .stat-card {
            border-radius: 20px;
            padding: 0.25rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card .glow {
            position: absolute;
            top: -50%;
            right: -30%;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.15;
            pointer-events: none;
        }
        .stat-card .card-body { position: relative; z-index: 1; }
        .stat-card .stat-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .stat-value { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; line-height: 1.1; }
        .stat-label { font-size: 0.82rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        .up { color: var(--green); }
        .down { color: var(--red); }
        .hero {
            background: linear-gradient(135deg, var(--hero-from), var(--hero-to));
            border-radius: 24px;
            padding: 2.5rem 3rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -30%; right: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(79,172,254,0.12), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero h1 { font-weight: 900; font-size: 2.5rem; letter-spacing: -1px; color: #fff; }
        .hero p { color: rgba(255,255,255,0.6); font-size: 1.05rem; }
        .hero .hero-stat { text-align: center; }
        .hero .hero-stat .num { font-size: 1.8rem; font-weight: 800; color: #fff; display: block; }
        .hero .hero-stat .label { font-size: 0.8rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
        .chart-container { position: relative; width: 100%; height: 300px; }
        .chart-container.tall { height: 400px; }
        .chart-container.full { height: 450px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #00f2fe);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 10px 28px;
            transition: all 0.25s;
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(79,172,254,0.35); color: #fff; }
        .form-control, .form-select {
            background: var(--surface);
            border: 2px solid var(--surface-border);
            border-radius: 12px;
            color: var(--text);
            transition: all 0.2s;
            padding: 10px 16px;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(79,172,254,0.12);
            background: var(--surface);
            color: var(--text);
        }
        .form-control::placeholder { color: var(--text-muted); opacity: 0.6; }
        .theme-toggle {
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 10px;
            width: 38px; height: 38px;
            color: #fff;
            cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.15); transform: rotate(15deg); }
        footer { text-align: center; padding: 2.5rem 0; color: var(--text-muted); font-size: 0.85rem; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeInUp 0.5s ease forwards; }
        .animate-in.d1 { animation-delay: 0.05s; }
        .animate-in.d2 { animation-delay: 0.1s; }
        .animate-in.d3 { animation-delay: 0.15s; }
        .animate-in.d4 { animation-delay: 0.2s; }
        .badge-symbol {
            background: var(--surface-border);
            border-radius: 8px;
            padding: 4px 12px;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .table { color: var(--text); margin-bottom: 0; }
        .table th { font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); border-bottom: 1px solid var(--surface-border); }
        .table td { border-bottom: 1px solid var(--surface-border); vertical-align: middle; }
        .table-hover tbody tr { transition: background 0.15s; }
        .table-hover tbody tr:hover { background: rgba(79,172,254,0.04); }
        .page-title { font-weight: 900; font-size: 2rem; letter-spacing: -0.5px; margin-bottom: 0.3rem; }
        .page-subtitle { color: var(--text-muted); font-size: 1rem; }
        select option { background: var(--bg); color: var(--text); }
        .countup { display: inline-block; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 4px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-chart-line"></i> StockScope</a>
            <div class="d-flex align-items-center gap-2 order-lg-last">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto me-3">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sector"><i class="fas fa-layer-group me-1"></i>Sectors</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stock"><i class="fas fa-search me-1"></i>Stock Lookup</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            <p class="mb-0"><i class="fas fa-chart-simple me-1"></i> StockScope &bull; S&P 500 Analysis &bull; Data via Yahoo Finance</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        }
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        })();

        let chartInstances = {};
        function registerChart(id, config) {
            const ctx = document.getElementById(id);
            if (!ctx) return;
            if (chartInstances[id]) chartInstances[id].destroy();
            config.options = config.options || {};
            config.options.responsive = true;
            config.options.maintainAspectRatio = false;
            chartInstances[id] = new Chart(ctx, config);
        }

        function countUp(el, target, suffix, duration) {
            if (!el) return;
            let start = 0;
            const step = target / (duration / 16);
            function tick() {
                start += step;
                if (start >= target) { el.textContent = (target > 0 ? '+' : '') + target.toFixed(1) + suffix; return; }
                el.textContent = (target > 0 ? '+' : '') + start.toFixed(1) + suffix;
                requestAnimationFrame(tick);
            }
            tick();
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.countup').forEach(el => {
                const target = parseFloat(el.dataset.target);
                const suffix = el.dataset.suffix || '';
                if (!isNaN(target)) countUp(el, target, suffix, 800);
            });
        });
    </script>
</body>
</html>
