<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}StockScope &mdash; S&amp;P 500 Analytics{% endblock %}</title>
    
    <!-- CDNs: Tailwind, FontAwesome, Chart.js, Inter Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <script>
        // Configure Tailwind with custom colors and dark mode strategy
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            200: '#b9defe',
                            300: '#7cc2fd',
                            400: '#36a2fc',
                            500: '#0c86eb',
                            600: '#0267c7',
                            700: '#0352a1',
                            800: '#074685',
                            900: '#0c3b6f',
                            950: '#08254b',
                        },
                        accent: {
                            green: '#10b981',
                            red: '#ef4444',
                            purple: '#8b5cf6',
                            yellow: '#f59e0b',
                            cyan: '#06b6d4',
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            :root {
                --bg-app: #f8fafc;
                --bg-card: #ffffff;
                --border-color: #e2e8f0;
                --text-primary: #0f172a;
                --text-secondary: #475569;
                --text-muted: #94a3b8;
                --glow-color: rgba(12, 134, 235, 0.05);
            }
            .dark {
                --bg-app: #090d16;
                --bg-card: #0f172a;
                --border-color: #1e293b;
                --text-primary: #f8fafc;
                --text-secondary: #94a3b8;
                --text-muted: #475569;
                --glow-color: rgba(12, 134, 235, 0.15);
            }
            body {
                @apply transition-colors duration-300;
                background-color: var(--bg-app);
                color: var(--text-primary);
            }
        }

        /* Glassmorphic Navigation with subtle animated grid background */
        .glass-nav {
            @apply backdrop-blur-md bg-opacity-80 transition-all duration-300;
            background-color: rgba(15, 23, 42, 0.1);
            border-bottom: 1px solid var(--border-color);
        }
        .dark .glass-nav {
            background-color: rgba(15, 23, 42, 0.6);
        }

        /* Premium card styles with glow effects and custom borders */
        .premium-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            @apply rounded-2xl shadow-sm transition-all duration-300 relative overflow-hidden;
        }
        .premium-card::before {
            content: '';
            @apply absolute top-0 left-0 right-0 h-[2px] opacity-0 transition-opacity duration-300;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4);
        }
        .premium-card:hover::before {
            @apply opacity-100;
        }
        .premium-card:hover {
            @apply shadow-lg -translate-y-1;
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 30px -10px var(--glow-color);
        }

        /* Hero banner custom radial gradient */
        .premium-hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            @apply relative overflow-hidden rounded-3xl border border-blue-900/30;
        }
        .premium-hero::after {
            content: '';
            @apply absolute inset-0 pointer-events-none;
            background: radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.15), transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.12), transparent 50%);
        }

        /* Animated indicator dots */
        .pulse-indicator {
            @apply relative flex h-2 w-2;
        }
        .pulse-indicator .ping {
            @apply animate-ping absolute inline-flex h-full w-full rounded-full opacity-75;
        }
        .pulse-indicator .dot {
            @apply relative inline-flex rounded-full h-2 w-2;
        }

        /* Custom scrollbar matching premium theme */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            @apply rounded-full bg-slate-300 dark:bg-slate-800;
        }
        ::-webkit-scrollbar-thumb:hover {
            @apply bg-slate-400 dark:bg-slate-700;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Premium Navigation -->
    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 via-indigo-600 to-cyan-500 flex items-center justify-center text-white shadow-lg shadow-blue-500/25 group-hover:scale-105 transition-transform duration-300">
                        <i class="fa-solid fa-chart-line text-lg"></i>
                    </div>
                    <span class="text-xl font-black tracking-tight bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-300 bg-clip-text text-transparent group-hover:opacity-90 transition-opacity">
                        StockScope
                    </span>
                </a>

                <!-- Navigation Links -->
                <nav class="hidden md:flex items-center gap-1">
                    <a href="/" class="nav-btn px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-all duration-250">
                        <i class="fa-solid fa-shapes"></i> Dashboard
                    </a>
                    <a href="/sector" class="nav-btn px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-all duration-250">
                        <i class="fa-solid fa-chart-pie"></i> Sectors
                    </a>
                    <a href="/stock" class="nav-btn px-4 py-2 rounded-xl text-sm font-semibold flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-all duration-250">
                        <i class="fa-solid fa-magnifying-glass"></i> Stock Lookup
                    </a>
                </nav>

                <!-- Action Group -->
                <div class="flex items-center gap-3">
                    <!-- Light/Dark Toggle -->
                    <button id="themeBtn" onclick="toggleTheme()" class="theme-toggle w-10 h-10 rounded-xl flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:scale-105 active:scale-95 transition-all duration-200 shadow-sm border border-slate-200 dark:border-slate-700" title="Toggle Theme">
                        <i id="themeIcon" class="fa-solid fa-sun text-md"></i>
                    </button>
                    <!-- Mobile Nav Trigger -->
                    <button onclick="toggleMobileNav()" class="md:hidden w-10 h-10 rounded-xl flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all duration-200">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Dropdown Navigation -->
        <div id="mobileNav" class="hidden md:hidden border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 py-3 flex flex-col gap-2">
            <a href="/" class="px-4 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-3 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
                <i class="fa-solid fa-shapes text-blue-500"></i> Dashboard
            </a>
            <a href="/sector" class="px-4 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-3 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
                <i class="fa-solid fa-chart-pie text-purple-500"></i> Sectors
            </a>
            <a href="/stock" class="px-4 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-3 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">
                <i class="fa-solid fa-magnifying-glass text-cyan-500"></i> Stock Lookup
            </a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 dark:border-slate-800 py-8 bg-white dark:bg-slate-950/40 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center md:flex md:items-center md:justify-between">
            <p class="text-sm text-slate-500 dark:text-slate-400">
                &copy; 2026 StockScope &bull; S&amp;P 500 Market Intelligence Tool.
            </p>
            <p class="text-xs text-slate-400 dark:text-slate-500 mt-2 md:mt-0">
                Designed for CS50x Final Project &bull; Live market data sourced via Yahoo Finance.
            </p>
        </div>
    </footer>

    <!-- Core Chart Theme Orchestrator -->
    <script>
        // Set active state for nav items
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const path = btn.getAttribute('href');
                if (currentPath === path) {
                    btn.classList.add('active');
                }
            });
        });

        // Manage global theme (dark/light)
        let _theme = localStorage.getItem('theme') || 'dark';
        
        function applyTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (_theme === 'dark') {
                html.classList.add('dark');
                icon.className = 'fa-solid fa-sun text-amber-500';
            } else {
                html.classList.remove('dark');
                icon.className = 'fa-solid fa-moon text-indigo-500';
            }
            // Repaint all active ChartJS canvases with appropriate colors
            updateChartColors();
        }

        function toggleTheme() {
            _theme = _theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', _theme);
            applyTheme();
        }

        function toggleMobileNav() {
            const nav = document.getElementById('mobileNav');
            nav.classList.toggle('hidden');
        }

        // Apply theme immediately to prevent layout flash
        applyTheme();

        // Standardized ChartJS configuration builder
        var charts = {};

        function mk(id, opts) {
            var el = document.getElementById(id);
            if (!el) return null;
            
            // Clean up existing instance to avoid memory leaks
            if (charts[id]) {
                charts[id].destroy();
                delete charts[id];
            }
            
            opts.options = opts.options || {};
            opts.options.responsive = true;
            opts.options.maintainAspectRatio = false;
            
            // Apply current theme palette to config
            decorateConfig(opts.options);
            
            charts[id] = new Chart(el, opts);
            return charts[id];
        }

        function getPalette() {
            const isDark = document.documentElement.classList.contains('dark');
            return {
                grid: isDark ? 'rgba(255, 255, 255, 0.04)' : 'rgba(15, 23, 42, 0.05)',
                tick: isDark ? '#94a3b8' : '#475569',
                text: isDark ? '#f8fafc' : '#0f172a',
                bgCard: isDark ? '#1e293b' : '#ffffff',
                borderCard: isDark ? '#334155' : '#e2e8f0',
            };
        }

        function decorateConfig(o) {
            const colors = getPalette();
            
            // Grid and Ticks Styling
            if (o.scales) {
                Object.values(o.scales).forEach(s => {
                    if (s.grid && s.grid._auto) {
                        s.grid.color = colors.grid;
                        s.grid.drawBorder = false;
                    }
                    if (s.ticks && s.ticks._auto) {
                        s.ticks.color = colors.tick;
                        s.ticks.font = {
                            size: 11,
                            family: 'Inter, sans-serif',
                            weight: '500'
                        };
                    }
                });
            }

            // Legend Styling
            if (o.plugins && o.plugins.legend) {
                o.plugins.legend.labels = o.plugins.legend.labels || {};
                if (o.plugins.legend.labels._auto) {
                    o.plugins.legend.labels.color = colors.tick;
                    o.plugins.legend.labels.usePointStyle = true;
                    o.plugins.legend.labels.pointStyle = 'circle';
                    o.plugins.legend.labels.padding = 16;
                    o.plugins.legend.labels.font = {
                        size: 11,
                        family: 'Inter, sans-serif',
                        weight: '600'
                    };
                }
            }

            // High-End Tooltips Styling
            if (o.plugins && o.plugins.tooltip) {
                o.plugins.tooltip = Object.assign({
                    backgroundColor: colors.bgCard,
                    titleColor: colors.text,
                    bodyColor: colors.tick,
                    borderColor: colors.borderCard,
                    borderWidth: 1,
                    cornerRadius: 12,
                    padding: 12,
                    titleFont: { size: 12, family: 'Inter, sans-serif', weight: '700' },
                    bodyFont: { size: 12, family: 'Inter, sans-serif' },
                    boxPadding: 6,
                    usePointStyle: true,
                }, o.plugins.tooltip);
            }
        }

        function updateChartColors() {
            const colors = getPalette();
            Object.values(charts).forEach(c => {
                decorateConfig(c.options);
                c.update();
            });
        }

        // Helpers to mark parameters as theme-reactive
        function autoGrid() { return { display: true, _auto: true }; }
        function autoTicks() { return { _auto: true }; }
        function autoLegend() { return { labels: { _auto: true } }; }
    </script>
</body>
</html>
