<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<title>{% block title %}StockScope{% endblock %}</title>
<style>
:root {
  --bg: #0b0e14;
  --bg2: #111520;
  --surface: #151a28;
  --surface2: #1a2035;
  --surface-border: #252d42;
  --surface-glow: rgba(59,130,246,0.04);
  --text: #e8ecf4;
  --text2: #a0a8c4;
  --text-muted: #5a6480;
  --nav-bg: rgba(11,14,20,0.92);
  --green: #00d68f;
  --green-dim: rgba(0,214,143,0.12);
  --green-glow: rgba(0,214,143,0.25);
  --red: #ff4757;
  --red-dim: rgba(255,71,87,0.12);
  --red-glow: rgba(255,71,87,0.25);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.1);
  --blue-glow: rgba(59,130,246,0.3);
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.1);
  --purple-glow: rgba(139,92,246,0.25);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.1);
  --cyan: #06b6d4;
  --cyan-dim: rgba(6,182,212,0.1);
  --chart-grid: rgba(255,255,255,0.04);
  --chart-tick: #5a6480;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse 80% 60% at 10% 20%, rgba(59,130,246,0.06) 0%, transparent 50%),
    radial-gradient(ellipse 60% 80% at 90% 80%, rgba(139,92,246,0.05) 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 50% 0%, rgba(0,214,143,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container { position: relative; z-index: 1; }

.navbar {
  background: var(--nav-bg) !important;
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  padding: 0.65rem 0;
  position: sticky;
  top: 0;
  z-index: 1000;
}

.navbar-brand {
  font-weight: 900;
  font-size: 1.35rem;
  letter-spacing: -0.8px;
  color: #fff !important;
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-icon {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  color: #fff;
  box-shadow: 0 4px 14px var(--blue-glow);
}

.nav-link {
  color: var(--text-muted) !important;
  font-weight: 500;
  font-size: 0.88rem;
  border-radius: var(--radius-sm);
  padding: 7px 16px !important;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-link:hover {
  color: var(--text) !important;
  background: rgba(255,255,255,0.05);
}

.nav-link.active {
  color: #fff !important;
  background: rgba(59,130,246,0.12);
}

.theme-toggle {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
  width: 38px;
  height: 38px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-toggle:hover {
  background: rgba(255,255,255,0.1);
  color: var(--amber);
  border-color: rgba(255,255,255,0.1);
}

.card {
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
  transition: all 0.3s ease;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(59,130,246,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover::before { opacity: 1; }
.card:hover { border-color: rgba(59,130,246,0.15); }

.card-header {
  background: transparent;
  border-bottom: 1px solid var(--surface-border);
  padding: 1.1rem 1.5rem;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.4px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 10px;
}

.card-header .header-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
}

.card-body { padding: 1.5rem; }

.stat-card {
  position: relative;
  overflow: hidden;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: -40%;
  right: -20%;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.15;
  pointer-events: none;
  transition: opacity 0.3s;
}

.stat-card:hover::after { opacity: 0.25; }
.stat-card.glow-green::after { background: var(--green); }
.stat-card.glow-red::after { background: var(--red); }
.stat-card.glow-blue::after { background: var(--blue); }
.stat-card.glow-purple::after { background: var(--purple); }
.stat-card.glow-amber::after { background: var(--amber); }
.stat-card.glow-cyan::after { background: var(--cyan); }

.stat-card .card-body { padding: 1.5rem; position: relative; z-index: 1; }

.stat-icon {
  width: 50px;
  height: 50px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.stat-value {
  font-size: 2rem;
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.1;
  font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
}

.stat-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.up { color: var(--green); }
.down { color: var(--red); }

.hero {
  background: linear-gradient(135deg, #0f1628 0%, #1a1040 40%, #0d2847 100%);
  border: 1px solid rgba(59,130,246,0.1);
  border-radius: 20px;
  padding: 2.5rem 3rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 60%);
  border-radius: 50%;
  animation: heroGlow 8s ease-in-out infinite alternate;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -30%;
  left: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(139,92,246,0.08), transparent 60%);
  border-radius: 50%;
  animation: heroGlow 10s ease-in-out infinite alternate-reverse;
}

@keyframes heroGlow {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(30px, -20px) scale(1.1); }
}

.hero h1 {
  font-weight: 900;
  font-size: 2.2rem;
  letter-spacing: -1px;
  color: #fff;
  margin-bottom: 0.4rem;
  position: relative;
  z-index: 1;
}

.hero p {
  color: rgba(255,255,255,0.45);
  font-size: 0.95rem;
  margin-bottom: 0;
  position: relative;
  z-index: 1;
}

.hero-stat {
  text-align: center;
  position: relative;
  z-index: 1;
  padding: 0.75rem 0;
  background: rgba(255,255,255,0.03);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}

.hero-stat .num {
  font-size: 1.8rem;
  font-weight: 900;
  color: #fff;
  display: block;
  letter-spacing: -0.5px;
  font-family: 'JetBrains Mono', monospace;
}

.hero-stat .label {
  font-size: 0.68rem;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 700;
  margin-top: 2px;
  display: block;
}

.chart-wrap {
  position: relative;
  width: 100%;
  padding: 0.5rem 0;
}

.chart-wrap.h-sm { height: 260px; }
.chart-wrap.h-md { height: 320px; }
.chart-wrap.h-lg { height: 380px; }
.chart-wrap.h-xl { height: 480px; }

.btn-primary {
  background: linear-gradient(135deg, var(--blue) 0%, #6366f1 100%);
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 0.88rem;
  padding: 10px 24px;
  transition: all 0.3s;
  color: #fff;
  letter-spacing: 0.3px;
  box-shadow: 0 4px 14px var(--blue-glow);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--blue-glow);
  color: #fff;
  filter: brightness(1.1);
}

.form-control, .form-select {
  background: var(--bg2);
  border: 1.5px solid var(--surface-border);
  border-radius: var(--radius-sm);
  color: var(--text);
  transition: all 0.25s;
  padding: 10px 16px;
  font-size: 0.9rem;
}

.form-control:focus, .form-select:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px var(--blue-dim), 0 0 20px var(--blue-dim);
  background: var(--bg2);
  color: var(--text);
}

.form-control::placeholder { color: var(--text-muted); }

.form-label {
  font-size: 0.7rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.badge-symbol {
  background: var(--surface2);
  border: 1px solid var(--surface-border);
  border-radius: var(--radius-xs);
  padding: 4px 12px;
  font-weight: 700;
  font-size: 0.82rem;
  font-family: 'JetBrains Mono', 'SF Mono', monospace;
  color: var(--text);
  letter-spacing: 0.5px;
}

.table { color: var(--text); margin-bottom: 0; }
.table th {
  font-weight: 800;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--surface-border);
  padding: 12px 16px;
  background: var(--bg2);
}

.table td {
  border-bottom: 1px solid var(--surface-border);
  vertical-align: middle;
  padding: 10px 16px;
  font-size: 0.88rem;
}

.table-hover tbody tr { transition: all 0.15s; }
.table-hover tbody tr:hover { background: var(--surface-glow); }

.page-title {
  font-weight: 900;
  font-size: 2rem;
  letter-spacing: -0.8px;
  margin-bottom: 0.3rem;
}

.page-subtitle { color: var(--text-muted); font-size: 0.9rem; }

select option { background: var(--surface); color: var(--text); }

.alert {
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  border: none;
}

.badge-signal {
  padding: 5px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.signal-strong { background: var(--green-dim); color: var(--green); box-shadow: 0 0 12px var(--green-dim); }
.signal-moderate { background: var(--amber-dim); color: var(--amber); box-shadow: 0 0 12px var(--amber-dim); }
.signal-weak { background: var(--red-dim); color: var(--red); box-shadow: 0 0 12px var(--red-dim); }

.search-card {
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: var(--radius);
  padding: 1.75rem;
  margin-bottom: 1.5rem;
  position: relative;
  overflow: hidden;
}

.search-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--purple), var(--cyan));
  opacity: 0.6;
}

footer {
  text-align: center;
  padding: 2.5rem 0 1.5rem;
  color: var(--text-muted);
  font-size: 0.78rem;
  letter-spacing: 0.3px;
  position: relative;
  z-index: 1;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeInUp 0.5s ease forwards;
  opacity: 0;
}

.fade-in.d1 { animation-delay: 0.06s; }
.fade-in.d2 { animation-delay: 0.12s; }
.fade-in.d3 { animation-delay: 0.18s; }
.fade-in.d4 { animation-delay: 0.24s; }
.fade-in.d5 { animation-delay: 0.3s; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 3px; }

@media (max-width: 768px) {
  .hero { padding: 1.5rem; border-radius: 14px; }
  .hero h1 { font-size: 1.5rem; }
  .stat-value { font-size: 1.5rem; }
  .hero-stat .num { font-size: 1.4rem; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">
      <div class="brand-icon"><i class="fas fa-bolt"></i></div>
      StockScope
    </a>
    <div class="d-flex align-items-center gap-2 order-lg-last">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">
        <i class="fas fa-sun" id="themeIcon"></i>
      </button>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto me-3">
        <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-chart-line"></i>Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/sector"><i class="fas fa-layer-group"></i>Sectors</a></li>
        <li class="nav-item"><a class="nav-link" href="/stock"><i class="fas fa-magnifying-glass-chart"></i>Lookup</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>

<footer>
  <div class="container">
    <p class="mb-0"><i class="fas fa-bolt me-1" style="color:var(--blue);"></i> StockScope &mdash; S&amp;P 500 Analysis &mdash; Powered by Yahoo Finance</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
var _theme = 'dark';

function toggleTheme() {
  _theme = _theme === 'dark' ? 'light' : 'dark';
  document.body.style.setProperty('--bg', _theme === 'dark' ? '#0b0e14' : '#f0f2f8');
  document.getElementById('themeIcon').className = _theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  localStorage.setItem('theme', _theme);
  updateAllCharts();
}

(function() {
  var saved = localStorage.getItem('theme');
  if (saved) _theme = saved;
  document.getElementById('themeIcon').className = _theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
})();

var chartInstances = {};

function gc() {
  return {
    grid: _theme === 'dark' ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.08)',
    tick: _theme === 'dark' ? '#5a6480' : '#6b7280',
    tipBg: _theme === 'dark' ? '#1a2035' : '#1a1d2e',
    tipText: _theme === 'dark' ? '#e8ecf4' : '#f9fafb',
    tipBorder: _theme === 'dark' ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)',
  };
}

function registerChart(id, config) {
  var el = document.getElementById(id);
  if (!el) return null;
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
  config.options = config.options || {};
  config.options.responsive = true;
  config.options.maintainAspectRatio = false;
  var c = gc();
  applyColors(config, c);
  chartInstances[id] = new Chart(el, config);
  return chartInstances[id];
}

function applyColors(cfg, c) {
  if (!cfg.options) return;
  var scales = cfg.options.scales;
  if (scales) {
    Object.keys(scales).forEach(function(k) {
      var s = scales[k];
      if (s.grid && s.grid._auto) { s.grid.color = c.grid; s.grid.drawBorder = false; }
      if (s.ticks && s.ticks._auto) { s.ticks.color = c.tick; }
    });
  }
  var tip = cfg.options.plugins && cfg.options.plugins.tooltip;
  if (tip) {
    if (tip._auto) {
      tip.backgroundColor = c.tipBg;
      tip.titleColor = c.tipText;
      tip.bodyColor = c.tipText;
      tip.borderColor = c.tipBorder;
      tip.borderWidth = 1;
    }
  }
  var leg = cfg.options.plugins && cfg.options.plugins.legend;
  if (leg && leg.labels && leg.labels._auto) {
    leg.labels.color = c.tick;
  }
}

function autoGrid() { return { display: true, _auto: true }; }
function autoTicks() { return { _auto: true, font: { size: 11, family: "'Inter', sans-serif" } }; }
function autoTip() { return { _auto: true, cornerRadius: 10, padding: 12, titleFont: { weight: '800', size: 13 }, bodyFont: { size: 13 } }; }
function autoLegend() { return { labels: { _auto: true, usePointStyle: true, pointStyle: 'circle', padding: 16, font: { weight: '600', size: 12 } } }; }

function updateAllCharts() {
  if (typeof rebuildCharts === 'function') rebuildCharts();
}
</script>
</body>
</html>
