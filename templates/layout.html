<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>S&P 500 Analysis</title>
    <style>
        * { font-family: 'Inter', -apple-system, sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .navbar-brand { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; }
        .navbar-brand i { color: #f6d365; margin-right: 8px; }
        .nav-link { font-weight: 500; border-radius: 8px; margin: 0 2px; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); }
        .card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #f8f9fa, #fff); border-bottom: 1px solid rgba(0,0,0,0.05); font-weight: 600; }
        .stat-card { border-radius: 16px; border: none; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .stat-card.blue::before { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .stat-card.green::before { background: linear-gradient(90deg, #43e97b, #38f9d7); }
        .stat-card.red::before { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .stat-card.purple::before { background: linear-gradient(90deg, #a18cd1, #fbc2eb); }
        .stat-card .card-text { font-size: 2rem; font-weight: 800; letter-spacing: -1px; }
        .chart-img { max-width: 100%; height: auto; border-radius: 8px; transition: transform 0.3s; }
        .chart-img:hover { transform: scale(1.02); }
        .up { color: #00b894; font-weight: 700; }
        .down { color: #e17055; font-weight: 700; }
        .table th { font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; color: #6c757d; }
        .table-hover tbody tr { transition: background 0.15s; }
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-weight: 800; font-size: 2.2rem; color: #1a1a2e; letter-spacing: -1px; }
        .page-header p { color: #6c757d; font-size: 1.1rem; }
        .form-control, .form-select { border-radius: 10px; border: 2px solid #e9ecef; transition: all 0.2s; }
        .form-control:focus, .form-select:focus { border-color: #4facfe; box-shadow: 0 0 0 3px rgba(79,172,254,0.15); }
        .btn-primary { background: linear-gradient(135deg, #4facfe, #00f2fe); border: none; border-radius: 10px; font-weight: 600; padding: 8px 24px; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(79,172,254,0.4); }
        .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; border-radius: 20px; padding: 2.5rem; margin-bottom: 2rem; position: relative; overflow: hidden; }
        .hero::after { content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(79,172,254,0.15), transparent); border-radius: 50%; }
        .hero h1 { font-weight: 800; font-size: 2.5rem; letter-spacing: -1px; position: relative; z-index: 1; }
        .hero p { opacity: 0.8; font-size: 1.1rem; position: relative; z-index: 1; }
        .hero .stat { text-align: center; position: relative; z-index: 1; }
        .hero .stat .num { font-size: 2rem; font-weight: 800; display: block; }
        .hero .stat .label { font-size: 0.85rem; opacity: 0.7; }
        .badge-symbol { background: rgba(255,255,255,0.1); border-radius: 8px; padding: 4px 12px; font-weight: 600; font-size: 0.85rem; }
        footer { text-align: center; padding: 2rem 0; color: #6c757d; font-size: 0.9rem; }
        .loader { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .loader.show { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e9ecef; border-top-color: #4facfe; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer i { color: #f6d365; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-chart-line"></i> StockScope</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-home me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sector"><i class="fas fa-layer-group me-1"></i>Sectors</a></li>
                    <li class="nav-item"><a class="nav-link" href="/stock"><i class="fas fa-search me-1"></i>Stock Lookup</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="loader" id="pageLoader">
        <div class="text-center">
            <div class="spinner mb-3"></div>
            <p class="text-muted fw-semibold">Fetching market data...</p>
        </div>
    </div>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container">
            <p class="mb-0"><i class="fas fa-chart-simple me-1"></i> StockScope &mdash; S&P 500 Analysis Tool &bull; Data via Yahoo Finance</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loader = document.getElementById('pageLoader');
            if (loader) { setTimeout(function(){ loader.classList.remove('show'); }, 500); }
        });
    </script>
</body>
</html>
